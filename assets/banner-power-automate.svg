  <ellipse cx="773" cy="192" rx="3" ry="1.5" fill="#ff9999" opacity="0.4"/>

  <!-- Fleche vers Excel -->
  <polygon points="795,208 808,204 808,212" fill="#27ae60" opacity="0.5"/>

  <!-- Excel destination bien rempli -->
