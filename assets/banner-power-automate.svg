  <line x1="451" y1="127" x2="438" y2="155" stroke="#6699ee" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="459" y1="127" x2="472" y2="155" stroke="#6699ee" stroke-width="3.5" stroke-linecap="round"/>
