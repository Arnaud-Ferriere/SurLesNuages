  <circle cx="120" cy="180" r="2" fill="#4a9eff" opacity="0.3"/>
  <circle cx="130" cy="170" r="2" fill="#4a9eff" opacity="0.3"/>
  <circle cx="140" cy="160" r="2" fill="#4a9eff" opacity="0.3"/>

