  <path d="M200 90 C215 75 230 75 240 85" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="225" y="72" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="8" fill="#c0392b" opacity="0.6">x4000</text>


