  <rect x="758" y="194" width="18" height="14" rx="3" fill="#8ac8a8" stroke="#1e8449" stroke-width="0.8"/>
  <!-- Roues -->
  <circle cx="732" cy="228" r="7" fill="#5a5a5a" stroke="#7a7a7a" stroke-width="1"/>
  <circle cx="732" cy="228" r="3" fill="#8a8a8a"/>
  <circle cx="768" cy="228" r="7" fill="#5a5a5a" stroke="#7a7a7a" stroke-width="1"/>
