<svg width="100%" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Labels Phase -->
  <text x="150" y="22" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#c0392b">Boucle na&#xEF;ve</text>
  <text x="450" y="22" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#e67e22">Optimis&#xE9;</text>
  <text x="740" y="22" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#27ae60">Robuste</text>

  <!-- Counts -->
  <text x="150" y="250" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="11" fill="#7a8a9a">8 000 actions</text>
  <text x="450" y="250" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="11" fill="#7a8a9a">~20 actions</text>
  <text x="740" y="250" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="11" fill="#7a8a9a">~20 actions, sans limite</text>

  <!-- Sol -->
  <line x1="20" y1="228" x2="880" y2="228" stroke="#7a8a9a" stroke-width="0.8"/>

  <!-- Separators -->
  <line x1="300" y1="30" x2="300" y2="240" stroke="#5a7a9a" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="590" y1="30" x2="590" y2="240" stroke="#5a7a9a" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Fleches entre phases -->
  <polygon points="305,124 305,136 318,130" fill="#7a8a9a"/>
  <polygon points="595,124 595,136 608,130" fill="#7a8a9a"/>


  <!-- ============================================================ -->
  <!--                    PHASE 1 : Boucle naive                     -->
  <!-- ============================================================ -->

  <!-- Grande pile source (SharePoint) -->
  <rect x="50" y="164" width="52" height="14" rx="3" fill="#4a9eff" stroke="#3a87db" stroke-width="0.8"/>
  <rect x="53" y="150" width="46" height="14" rx="3" fill="#5cacff" stroke="#4a9eff" stroke-width="0.8"/>
  <rect x="56" y="136" width="40" height="14" rx="3" fill="#6eb8ff" stroke="#5cacff" stroke-width="0.8"/>
  <rect x="59" y="122" width="34" height="14" rx="3" fill="#80c4ff" stroke="#6eb8ff" stroke-width="0.8"/>
  <rect x="62" y="108" width="28" height="14" rx="3" fill="#92d0ff" stroke="#80c4ff" stroke-width="0.8"/>
  <rect x="65" y="94" width="22" height="14" rx="3" fill="#a4dcff" stroke="#92d0ff" stroke-width="0.8"/>
  <rect x="68" y="80" width="16" height="14" rx="3" fill="#b6e8ff" stroke="#a4dcff" stroke-width="0.8"/>
