  <text x="76" y="195" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="8" fill="#4a9eff" opacity="0.8">SPO list</text>

  <!-- Petit perso fatigue qui porte un bloc -->
  <circle cx="165" cy="118" r="12" fill="#f0c888" stroke="#c08848" stroke-width="1"/>
  <!-- Yeux fatigues -->
