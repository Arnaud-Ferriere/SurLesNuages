  <rect x="220" y="190" width="40" height="34" rx="4" fill="#e8f0e8" fill-opacity="0.85" stroke="#27ae60" stroke-width="1.2"/>
  <text x="240" y="210" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#27ae60">X</text>
  <rect x="225" y="196" width="12" height="5" rx="1" fill="#4a9eff" opacity="0.4"/>
  <text x="240" y="237" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="8" fill="#27ae60">Excel</text>

