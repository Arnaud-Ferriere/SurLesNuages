  <rect x="535" y="184" width="12" height="5" rx="1" fill="#4a9eff" opacity="0.5"/>
  <rect x="535" y="191" width="12" height="5" rx="1" fill="#5cacff" opacity="0.5"/>
  <rect x="535" y="198" width="12" height="5" rx="1" fill="#6eb8ff" opacity="0.5"/>
  <rect x="535" y="205" width="12" height="5" rx="1" fill="#80c4ff" opacity="0.5"/>
