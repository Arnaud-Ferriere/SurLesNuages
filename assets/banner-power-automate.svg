  <line x1="167" y1="115" x2="170" y2="117" stroke="#8a5828" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Bouche triste -->
  <path d="M160 124 Q165 121 170 124" fill="none" stroke="#8a5828" stroke-width="1.4" stroke-linecap="round"/>
