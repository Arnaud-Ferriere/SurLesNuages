  <!-- Benne avec blocs -->
  <rect x="718" y="176" width="38" height="16" rx="2" fill="none" stroke="#1e8449" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="722" y="178" width="8" height="5" rx="1" fill="#4a9eff" opacity="0.6"/>
  <rect x="731" y="178" width="8" height="5" rx="1" fill="#5cacff" opacity="0.6"/>
  <rect x="740" y="178" width="8" height="5" rx="1" fill="#6eb8ff" opacity="0.6"/>
  <rect x="722" y="184" width="8" height="5" rx="1" fill="#80c4ff" opacity="0.6"/>
  <rect x="731" y="184" width="8" height="5" rx="1" fill="#92d0ff" opacity="0.6"/>
  <rect x="740" y="184" width="8" height="5" rx="1" fill="#a4dcff" opacity="0.6"/>

