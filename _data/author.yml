bio: >-
  Je suis tombé dans l'informatique tout petit avec un bon vieux 286 sur MS-DOS 6.22. J'ai grandi avec
  et suivi toutes les évolutions depuis, en passant par Windows 95 et ses 50 disquettes d'installation
  (jamais dans le même ordre !) jusqu'au développement actuel des IA... et de tout ce qui viendra !
  <br />
  Aujourd'hui, je suis consultant et Administrateur systèmes spécialisé dans la gestion des identités
  et les environnements hybrides Active Directory - Entra ID et les outils collaboratifs Microsoft 365.
  A côté de ça j'ai développé mes compétences en automatisation sur la Power Platform de Microsoft et
  PowerShell, me permettant de contribuer à des projets où l'innovation et l'amélioration continue
  sont des priorités.<br />
  J'ai beaucoup appris en ligne et j'ai créé ce site pour essayer de contribuer, à mon tour et à ma
  façon, à partager mon expérience.
