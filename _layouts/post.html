---
layout: default
---

<article class="container mt-5">
    <div class="article-container p-4">
        <header class="text-center mb-4">
            <h1 class="display-5">{{ page.title }}</h1>
            <p class="text-muted">Publié le : {{ page.date | date: "%d/%m/%Y" }}</p>
            {% if page.image %}
            <img src="{{ page.image | relative_url }}" class="img-fluid rounded mb-4" alt="{{ page.title }}">
            {% endif %}
        </header>

        <section class="content">
            {{ content }}
        </section>
    </div>
</article>
