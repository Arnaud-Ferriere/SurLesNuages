title: Sur les nuages
home_title: "Bienvenue sur les nuages !"
home_tagline: "Découvrez mes derniers articles sur l'administration système, le cloud, et bien plus encore !"
default_image: /assets/photo.webp
default_banner: ""
description: >-
  Consultant en administration systèmes, spécialisé dans les environnements
  hybrides, la gestion des identités, les solutions Microsoft 365 et
  l'automatisation. Découvrez mes articles, projets et certifications.
url: "https://surlesnuages.fr"
baseurl: ""
lang: fr

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /articles/:title/

sass:
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

paginate: 6
paginate_path: "/page:num/"

# Jekyll 3 : spécifier `exclude` remplace les defaults — on doit donc
# redéclarer les entrées importantes (Gemfile, node_modules, vendor/…).
# Les dot-files (.claude, .vscode, .obsidian…) sont auto-exclus.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - CLAUDE.md
  - Templates

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
