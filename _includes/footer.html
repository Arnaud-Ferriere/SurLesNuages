{% assign footer_wave = site.static_files | where: "path", "/assets/clouds-footer.svg" | first %}
<footer class="cloud-footer">
  {% if footer_wave %}<div class="footer-wave" aria-hidden="true"></div>{% endif %}
  <div class="footer-content">
    <p>{{ site.data.author.name_display }} - {{ site.time | date: '%Y' }}</p>
    <p class="footer-cirrus">Basé sur <a href="https://github.com/Arnaud-Ferriere/Cirrus-for-Jekyll" target="_blank" rel="noopener noreferrer">Cirrus for Jekyll</a>, mon template open source — <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener noreferrer">CC BY 4.0</a></p>
  </div>
</footer>
