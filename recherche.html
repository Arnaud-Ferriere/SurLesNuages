---
layout: default
title: Recherche
permalink: /recherche/
---

<div class="container mt-5">
    <h1 class="display-5 mb-4">Rechercher un article</h1>

    <div class="mb-4">
        <input type="text" id="search-input" class="form-control form-control-lg"
            placeholder="Tapez votre recherche..." autofocus>
    </div>

    <div id="search-results"></div>
</div>

<script>
    var posts = [
        {% for post in site.posts %}
        {
            title: {{ post.title | jsonify }},
            url: {{ post.url | relative_url | jsonify }},
            date: "{{ post.date | date: '%d/%m/%Y' }}",
            excerpt: {{ post.excerpt | strip_html | truncate: 200 | jsonify }},
            tags: {{ post.tags | jsonify }},
            content: {{ post.content | strip_html | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    var searchInput = document.getElementById('search-input');
    var resultsContainer = document.getElementById('search-results');

    searchInput.addEventListener('input', function () {
        var query = this.value.toLowerCase().trim();

        if (query.length < 2) {
            resultsContainer.innerHTML = '';
            return;
        }

        var results = posts.filter(function (post) {
            return post.title.toLowerCase().includes(query) ||
                post.excerpt.toLowerCase().includes(query) ||
                post.content.toLowerCase().includes(query) ||
                post.tags.some(function (tag) { return tag.toLowerCase().includes(query); });
        });

        if (results.length === 0) {
            resultsContainer.innerHTML = '<p class="text-muted">Aucun article trouvé.</p>';
            return;
        }

        var html = '<div class="row">';
        results.forEach(function (post) {
            html += '<div class="col-md-6 mb-3">' +
                '<div class="card p-3 h-100" style="position:relative;cursor:pointer;">' +
                '<h5 class="card-title"><a href="' + post.url + '" class="stretched-link text-decoration-none">' + post.title + '</a></h5>' +
                '<p class="card-text">' + post.excerpt + '</p>' +
                '<p class="text-muted small mb-0">' + post.date + '</p>' +
                '</div></div>';
        });
        html += '</div>';
        resultsContainer.innerHTML = html;
    });
</script>
